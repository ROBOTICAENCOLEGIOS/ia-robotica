<!DOCTYPE html>
<html>
<head>
    <title>REC - Laboratorio IA</title>
    <style>body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;}</style>
</head>
<body>
    <div>🚀 Iniciando Modo Experto...</div>
    <script>
        const base = "https://roboticaencolegios.github.io/ia-robotica/";
        const files = ["extensionpcb.js", "iamanos.js", "senialestransito.js", "vozatexto.js"];
        
        // La clave es el parámetro 'unsandboxed-extension' en la URL
        const url = `https://turbowarp.org/editor?unsandboxed-extension=${files.map(f => base + f).join('&unsandboxed-extension=')}`;
        
        window.location.href = url;
    </script>
</body>
