<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REC - Laboratorio de IA</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
        }
        .loader { 
            border: 4px solid #333; 
            border-top: 4px solid #eab308; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            animation: spin 1s linear infinite; 
            margin-bottom: 20px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-weight: bold; letter-spacing: 1px; color: #eab308; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">Sincronizando Laboratorio REC con GitHub...</div>

    <script>
        const user = "ROBOTICAENCOLEGIOS";
        const repo = "ia-robotica";
        const base = `https://${user}.github.io/${repo}/`;
        
        // El v=Date.now() es vital para que NO cargue versiones viejas de tus archivos
        const v = Date.now(); 

        const fileNames = [
            "extensionpcb.js",
            "iamanos.js",
            "senialestransito.js",
            "vozatexto.js"
        ];

        // Creamos la lista de extensiones con el truco anti-caché (?v=...)
        const extensions = fileNames.map(file => `${base}${file}?v=${v}`);

        // IMPORTANTE: TurboWarp usa el parámetro 'extension' para todas las extensiones
        // El modo unsandboxed se maneja automáticamente con // @turbowarp-force-unsandboxed
        const params = extensions.map(url => `extension=${encodeURIComponent(url)}`).join('&');
        
        const twUrl = `https://turbowarp.org/editor?${params}`;

        setTimeout(() => {
            window.location.href = twUrl;
        }, 1200);
    </script>
</body>
</html>
