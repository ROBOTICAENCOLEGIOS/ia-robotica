<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REC - Laboratorio de IA y Robótica</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EAB308">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #111;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Pantalla de carga */
        #splash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; background: #000;
            transition: opacity 0.5s ease-out;
        }
        .logo { width: 120px; height: 120px; margin-bottom: 20px; }
        .loader-bar {
            width: 200px; height: 4px; background: #333;
            border-radius: 2px; overflow: hidden;
        }
        .progress {
            width: 0%; height: 100%; background: #EAB308;
            transition: width 0.3s;
        }
        #status-text { color: #EAB308; margin-top: 15px; font-size: 14px; letter-spacing: 1px; }

        /* El Editor */
        iframe {
            border: none; width: 100%; height: 100%;
            display: none; /* Se muestra al cargar */
        }
    </style>
</head>
<body>

    <div id="splash">
        <img src="icon.png" class="logo" alt="REC Logo">
        <div class="loader-bar"><div class="progress" id="bar"></div></div>
        <div id="status-text">INICIANDO LABORATORIO...</div>
    </div>

    <iframe 
        id="editor"
        src="https://turbowarp.org/editor?embed" 
        allow="serial; camera; microphone; bluetooth; display-capture"
        allowfullscreen>
    </iframe>

    <script>
        const splash = document.getElementById('splash');
        const bar = document.getElementById('bar');
        const status = document.getElementById('status-text');
        const iframe = document.getElementById('editor');

        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        // Simulación de carga y comunicación
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress > 90) progress = 90;
            bar.style.width = progress + '%';
        }, 200);

        iframe.onload = () => {
            bar.style.width = '100%';
            status.innerText = "CONFIGURANDO BLOQUES REC...";
            
            // PEQUEÑO TRUCO: Inyectamos el loader.js dentro del iframe
            // Para que el loader tenga acceso al VM del editor
            try {
                const script = document.createElement('script');
                script.src = "./loader.js?v=" + Date.now();
                // Intentamos acceder al contenido del iframe (esto requiere que el loader use postMessage o sea inyectado)
                // Como turbowarp.org y github son dominios distintos, usaremos un puente de URL
                
                // ACTUALIZACIÓN DE ESTRATEGIA:
                // Como el iframe es de otro dominio, no podemos inyectar JS directo por seguridad.
                // Entonces, pasamos el loader como una extensión más en la URL:
                const loaderUrl = window.location.href.replace('index.html', '') + 'loader.js';
                const finalTwUrl = `https://turbowarp.org/editor?extension=${encodeURIComponent(loaderUrl)}`;
                
                iframe.src = finalTwUrl;
                
                setTimeout(() => {
                    splash.style.opacity = '0';
                    iframe.style.display = 'block';
                    setTimeout(() => splash.remove(), 500);
                }, 2000);
            } catch (e) {
                console.error("Error de cross-origin, usando fallback...");
                splash.remove();
                iframe.style.display = 'block';
            }
            clearInterval(interval);
        };
    </script>
</body>
</html>
